    resources:
    - path: /v1/capacities
      name: capacities
      description: REST surface for capacities.
      operations:
      - method: GET
        name: listcapacities
        description: List capacities
        call: microsoft-fabric-capacities.listcapacities
        outputParameters:
        - type: object
          mapping: $.
