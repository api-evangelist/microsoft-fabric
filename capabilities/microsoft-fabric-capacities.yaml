  tags:
  - Microsoft Fabric
  - Capacities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_FABRIC_API_KEY: MICROSOFT_FABRIC_API_KEY
capability:
